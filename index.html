<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>המירוץ העולמי - פאזלס חדרי בריחה</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080800;
      background-image: radial-gradient(ellipse at 25% 15%, #1a0800 0%, #080e00 40%, #001a18 100%);
      font-family: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    #stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .star { position: absolute; border-radius: 50%; animation: twinkle ease-in-out infinite; }

    #app {
      position: relative; z-index: 1;
      max-width: 740px; margin: 0 auto;
      padding: 44px 20px 100px;
    }

    /* ===== כותרת ===== */
    .page-header {
      text-align: center; margin-bottom: 36px;
      padding: 28px 24px 24px;
      background: rgba(20,10,0,0.65);
      border-radius: 16px;
      border: 1px solid rgba(255,140,0,0.3);
      position: relative; overflow: hidden;
    }
    .page-header::before {
      content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,160,0,0.9), rgba(0,210,190,0.6), transparent);
    }
    .site-label {
      font-size: 11px; letter-spacing: 5px;
      color: rgba(0,200,190,0.65); margin-bottom: 14px;
    }
    .page-title {
      color: #ffe0a0; font-size: clamp(22px, 5vw, 34px);
      font-weight: 800; line-height: 1.3; margin-bottom: 8px;
    }
    .title-divider {
      width: 70px; height: 3px;
      background: linear-gradient(90deg, rgba(255,140,0,0.9), rgba(0,210,190,0.7));
      margin: 16px auto 18px; border-radius: 2px;
    }
    .page-desc {
      color: rgba(255,230,180,0.78); font-size: 15.5px;
      line-height: 2.1; white-space: pre-wrap;
      max-width: 560px; margin: 0 auto;
    }

    /* ===== יוטיוב ===== */
    .youtube-wrap {
      position: relative; padding-bottom: 56.25%; height: 0;
      border-radius: 12px; overflow: hidden;
      border: 2px solid rgba(255,140,0,0.45);
      margin-bottom: 28px;
    }
    .youtube-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    /* ===== תיבת קוד ===== */
    .code-box {
      background: rgba(20,8,0,0.72);
      border: 1.5px solid rgba(255,120,0,0.45);
      border-radius: 14px; margin-top: 10px;
      position: relative; overflow: hidden;
      padding: 32px 24px 28px; text-align: center;
    }
    .code-box::before {
      content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,160,0,0.8), rgba(0,210,190,0.5), transparent);
    }
    .code-section-label {
      display: flex; align-items: center;
      justify-content: center; gap: 10px; margin-bottom: 20px;
    }
    .code-section-label hr { flex: 1; border: none; border-top: 1px solid rgba(255,140,0,0.2); }
    .code-section-label span { font-size: 13px; letter-spacing: 3px; color: rgba(0,200,190,0.75); white-space: nowrap; }
    .code-instruction { font-size: 15px; color: rgba(255,230,180,0.9); margin-bottom: 22px; font-weight: 500; }
    .code-input-wrap { display: inline-flex; flex-direction: column; align-items: center; gap: 14px; }
    .code-glow-ring {
      border-radius: 10px; padding: 3px;
      background: linear-gradient(135deg, rgba(255,100,0,0.25), rgba(0,180,170,0.15));
      transition: background 0.3s;
    }
    .code-glow-ring.focused { background: linear-gradient(135deg, rgba(255,160,0,0.7), rgba(0,210,190,0.5)); }
    .code-input {
      display: block; background: rgba(30,10,0,0.9);
      border: none; border-radius: 8px; padding: 16px 24px;
      color: #ffe8c0; font-size: 22px; outline: none;
      direction: ltr; letter-spacing: 6px; text-align: center;
      width: 260px; transition: background 0.2s;
      caret-color: #ff9500; font-family: inherit;
    }
    .code-input.error { background: rgba(80,10,0,0.9); color: #ffaaaa; }
    .code-hint { font-size: 13px; color: rgba(0,200,190,0.6); animation: bounce 1.5s ease-in-out infinite; }
    .submit-btn {
      background: linear-gradient(180deg, #ff9500 0%, #d96000 60%, #a84000 100%);
      border: none;
      border-bottom: 5px solid #6a2800;
      border-radius: 10px;
      color: #fff; padding: 14px 40px; font-size: 16px;
      cursor: pointer;
      font-family: inherit; font-weight: 800; letter-spacing: 1px; width: 260px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
      box-shadow: 0 6px 0 #6a2800, 0 8px 16px rgba(0,0,0,0.35);
      transition: all 0.12s;
    }
    .submit-btn:hover { filter: brightness(1.1); }
    .submit-btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #6a2800, 0 2px 6px rgba(0,0,0,0.3);
      border-bottom-width: 1px;
    }
    .error-msg {
      display: none; margin-top: 16px;
      background: rgba(180,20,0,0.25);
      border: 1px solid rgba(255,80,50,0.45);
      border-radius: 8px; padding: 10px 20px;
      color: rgba(255,160,140,0.95); font-size: 14px;
    }

    /* ===== צומת — כפתורי בחירה ===== */
    .crossroads-wrap { margin-top: 10px; text-align: center; padding: 28px 16px 32px; background: rgba(20,8,0,0.72); border: 1.5px solid rgba(255,120,0,0.4); border-radius: 14px; position: relative; overflow: hidden; }
    .crossroads-wrap::before { content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 2px; background: linear-gradient(90deg, transparent, rgba(255,160,0,0.8), rgba(0,210,190,0.5), transparent); }
    .crossroads-title {
      text-align: center; font-size: 17px;
      color: rgba(255,220,150,0.9); margin-bottom: 24px; font-weight: 700;
    }
    .choice-btns { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .choice-btn {
      flex: 1; min-width: 260px; max-width: 340px;
      border-radius: 16px; border: none; overflow: hidden;
      cursor: pointer; font-family: inherit;
      transition: all 0.15s; padding: 0;
      box-shadow: 0 8px 0 rgba(0,0,0,0.55), 0 10px 24px rgba(0,0,0,0.4);
    }
    .choice-btn:hover { transform: translateY(-5px); box-shadow: 0 13px 0 rgba(0,0,0,0.55), 0 16px 28px rgba(0,0,0,0.4); filter: brightness(1.08); }
    .choice-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 rgba(0,0,0,0.5); }
    .choice-img { width: 100%; height: 220px; object-fit: cover; display: block; }
    .choice-lbl { display: block; width: 100%; background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.7) 100%); color: #fff; font-size: 22px; font-weight: 800; padding: 16px 20px 20px; text-shadow: 0 2px 8px rgba(0,0,0,0.9); letter-spacing: 0.5px; }
    .choice-btn .choice-icon { display: none; }

    /* ===== נכון/לא נכון ===== */
    .tf-wrap { margin-top: 10px; }
    .tf-title {
      text-align: center; font-size: 15px;
      color: rgba(190,225,255,0.85); margin-bottom: 20px; font-weight: 500;
      padding: 0 12px;
    }
    .tf-questions { display: flex; flex-direction: column; gap: 12px; }
    .tf-row {
      display: flex; align-items: center; gap: 12px;
      background: rgba(15,35,80,0.5);
      border: 1px solid rgba(60,120,200,0.25);
      border-radius: 10px; padding: 14px 18px;
    }
    .tf-row-num { font-size: 13px; color: rgba(120,180,255,0.5); min-width: 24px; }
    .tf-row-label { flex: 1; font-size: 15px; color: rgba(200,225,255,0.8); }
